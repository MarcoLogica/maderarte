<section class="form-fortaleza">
    <h2>Editar Fortaleza</h2>

    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Título</label>
        <input type="text" name="titulo" value="{{ fortaleza.titulo }}" required>

        <label>Descripción</label>
        <textarea name="descripcion" required>{{ fortaleza.descripcion }}</textarea>

        <label>Imagen actual</label>
        {% if fortaleza.imagen %}
            <img src="{{ fortaleza.imagen.url }}" class="img-fortaleza">
        {% else %}
            <p>No hay imagen cargada.</p>
        {% endif %}
        <input type="file" name="imagen" accept="image/*">

        <label>Video actual</label>
        {% if fortaleza.video %}
            <video controls class="video-fortaleza">
                <source src="{{ fortaleza.video.url }}" type="video/mp4">
            </video>
        {% else %}
            <p>No hay video cargado.</p>
        {% endif %}
        <input type="file" name="video" accept="video/mp4">

        <button type="submit" class="btn-guardar">Guardar cambios</button>
    </form>
</section>
