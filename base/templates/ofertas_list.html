<style>
  .navbar {
    background-color: #a3c9a8;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Quicksand', sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.logo a {
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 1.5rem;
}

.nav-links li a {
    color: #8E44AD;
    text-decoration: none;
    font-weight: bold;
    font-size: 1rem;
    transition: color 0.3s ease;
}

.nav-links li a:hover {
    color: #fce4ec;
}

</style>

<nav class="navbar">
    <div class="logo">
        <a href="{% url 'home' %}">Vipalú</a>
    </div>
    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'panel' %}">Panel</a></li>

        <li><a href="{% url 'ver_carrito' %}">🛒 Ver carrito</a></li>
        <li><a href="{% url 'contactanos' %}">Contacto</a></li>
    </ul>
</nav>

<section class="panel-fortalezas">
    <h2>Gestionar Ofertas del Mes</h2>

    <a href="{% url 'crear_oferta' %}" class="btn-crear">➕ Crear nueva oferta</a>

    <div class="fortalezas-grid">
        {% for o in ofertas %}
        <div class="fortaleza-card">
            <h3>{{ o.titulo }}</h3>
            <p>{{ o.descripcion }}</p>

            {% if o.imagen %}
                <img src="{{ o.imagen.url }}" class="media-oferta">

            {% endif %}

            {% if o.video %}
                <video controls class="media-oferta">

                    <source src="{{ o.video.url }}" type="video/mp4">
                </video>
            {% endif %}

            <a href="{% url 'editar_oferta' o.id %}" class="btn-editar">✏️ Editar</a>
            <a href="{% url 'eliminar_oferta' o.id %}" class="btn-eliminar">🗑️ Eliminar</a>
        </div>
        {% endfor %}
    </div>
</section>
