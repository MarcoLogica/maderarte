<section class="form-testimonio">
    <h2>Editar Testimonio</h2>

    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Título</label>
        <input type="text" name="titulo" value="{{ testimonio.titulo }}" required>

        <label>Comentario</label>
        <textarea name="comentario">{{ testimonio.comentario }}</textarea>

        <label>Imagen actual</label>
        {% if testimonio.imagen %}
            <img src="{{ testimonio.imagen.url }}" class="media-testimonio-admin">
        {% endif %}
        <input type="file" name="imagen" accept="image/*">

        <button type="submit" class="btn-guardar">Guardar cambios</button>
    </form>
</section>
