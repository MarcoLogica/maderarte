
<style>

    /* Panel de fortalezas */
.panel-fortalezas {
    max-width: 500px;
    margin: 40px auto;
    background: #F6EEDC;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.fortalezas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
}

.fortaleza-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    text-align: center;
}

/* Previsualización pequeña tipo reels */
.media-preview {
    width: 100%;
    max-height: 260px; /* tamaño pequeño tipo celular */
    aspect-ratio: 9 / 16;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* Botones */
.btn-crear, .btn-editar {
    display: inline-block;
    background: #8FBFA8;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 15px;
    font-weight: 600;
}

.btn-crear:hover, .btn-editar:hover {
    background: #7BA4C8;
}


</style>

<section class="panel-fortalezas">
    <h2>Gestionar Fortalezas</h2>

    <a href="{% url 'crear_fortaleza' %}" class="btn-crear">➕ Crear nueva fortaleza</a>

    <div class="fortalezas-grid">
        {% for f in fortalezas %}
        <div class="fortaleza-card">
            <h3>{{ f.titulo }}</h3>
            <p>{{ f.descripcion }}</p>

            {% if f.imagen %}
                <img src="{{ f.imagen.url }}" class="media-preview">
            {% endif %}

            {% if f.video %}
                <video controls class="media-preview">
                    <source src="{{ f.video.url }}" type="video/mp4">
                </video>
            {% endif %}

            <a href="{% url 'editar_fortaleza' f.id %}" class="btn-editar">✏️ Editar</a>
        </div>
        {% endfor %}
    </div>
</section>
