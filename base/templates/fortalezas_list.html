
<style>

    /* Panel de fortalezas */
.panel-fortalezas {
    max-width: 500px;
    margin: 40px auto;
    background: #F6EEDC;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.fortalezas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
}

.fortaleza-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    text-align: center;
}

/* Previsualización pequeña tipo reels */
.media-preview {
    width: 100%;
    max-height: 260px; /* tamaño pequeño tipo celular */
    aspect-ratio: 9 / 16;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* Botones */
.btn-crear, .btn-editar {
    display: inline-block;
    background: #8FBFA8;
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 15px;
    font-weight: 600;
}

.btn-crear:hover, .btn-editar:hover {
    background: #7BA4C8;
}

    .btn-eliminar {
    display: inline-block;
    background: #E57373; /* rojo suave */
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 10px;
    font-weight: 600;
}

.btn-eliminar:hover {
    background: #D32F2F; /* rojo más fuerte */
}

      .navbar {
    background-color: #a3c9a8;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Quicksand', sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.logo a {
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 1.5rem;
}

.nav-links li a {
    color: #8E44AD;
    text-decoration: none;
    font-weight: bold;
    font-size: 1rem;
    transition: color 0.3s ease;
}

.nav-links li a:hover {
    color: #fce4ec;
}



</style>

<nav class="navbar">
    <div class="logo">
        <a href="{% url 'home' %}">Vipalú</a>
    </div>
    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'panel' %}">Panel</a></li>

        <li><a href="{% url 'ver_carrito' %}">🛒 Ver carrito</a></li>
        <li><a href="{% url 'contactanos' %}">Contacto</a></li>
    </ul>
</nav>

<section class="panel-fortalezas">
    <h2>Gestionar Fortalezas</h2>

    <a href="{% url 'crear_fortaleza' %}" class="btn-crear">➕ Crear nueva fortaleza</a>

    <div class="fortalezas-grid">
        {% for f in fortalezas %}
        <div class="fortaleza-card">
            <h3>{{ f.titulo }}</h3>
            <p>{{ f.descripcion }}</p>

            {% if f.imagen %}
                <img src="{{ f.imagen.url }}" class="media-preview">
            {% endif %}

            {% if f.video %}
                <video controls class="media-preview">
                    <source src="{{ f.video.url }}" type="video/mp4">
                </video>
            {% endif %}

            <a href="{% url 'editar_fortaleza' f.id %}" class="btn-editar">✏️ Editar</a>
            <a href="{% url 'editar_fortaleza' f.id %}" class="btn-editar">✏️ Editar</a>

<a href="{% url 'eliminar_fortaleza' f.id %}" class="btn-eliminar"
   onclick="return confirm('¿Seguro que deseas eliminar esta fortaleza?');">
   🗑️ Eliminar
</a>

        </div>
        {% endfor %}
    </div>
</section>
